<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Director · UI playground (standalone)</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body,
#app {
  min-height: 100%;
}

html,
body,
button,
input,
select,
textarea {
  color: #f8f8f8;
}

html[data-theme='light'],
html[data-theme='light'] body,
html[data-theme='light'] button,
html[data-theme='light'] input,
html[data-theme='light'] select,
html[data-theme='light'] textarea {
  color: #1a1a1a;
}

/* Theme-aware accent tokens — kept simple, mostly overrides for accent text. */
:root {
  --d-accent: #e6a04a;
  --d-accent-strong: #c97a3a;
  --d-accent-darker: #b56a2c;
  --d-danger: #e25668;
  --d-toast-bg: rgba(30, 30, 30, 0.92);
  --d-toast-fg: #f8f8f8;
}

html[data-theme='light'] {
  /* darker amber, readable on white */
  --d-accent: #8c4a17;
  --d-accent-strong: #8c4a17;
  --d-accent-darker: #6e3a11;
  --d-danger: #b13049;
  --d-toast-bg: rgba(255, 255, 255, 0.96);
  --d-toast-fg: #1a1a1a;
}

html {
  background-color: var(--plugin-tokens-modal-anonymous-bg, transparent);
  color-scheme: dark light;
  font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica,
    Arial, sans-serif;
  font-size: 14px;
  line-height: 20px;
  -webkit-font-smoothing: antialiased;
}

button,
input,
select,
textarea {
  font-family: inherit;
}

button {
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
}

/* ---------- layout ---------- */

.menu-shell {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 560px;
  margin: 0 auto;
}

.menu-shell--act-pulse {
  animation: menu-shell-activity 0.52s ease-out;
}

@keyframes menu-shell-activity {
  0% {
    filter: brightness(1);
  }
  40% {
    filter: brightness(1.08);
    box-shadow: 0 0 0 2px rgba(230, 160, 74, 0.35);
    border-radius: 14px;
  }
  100% {
    filter: brightness(1);
    box-shadow: none;
  }
}

@media (prefers-reduced-motion: reduce) {
  .menu-shell--act-pulse {
    animation: none;
  }
}

.menu-card {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(127, 127, 127, 0.18);
}

.menu-card:first-child {
  padding-top: 4px;
}

.menu-card:last-child {
  border-bottom: none;
}

/* ---------- status row ---------- */

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: space-between;
}

.live-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
  font-size: 14px;
  color: inherit;
  opacity: 0.65;
}

.live-chip .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.5;
}

.live-chip.is-live {
  color: var(--d-danger);
  opacity: 1;
}

.live-chip.is-live .dot {
  background: currentColor;
  opacity: 1;
  box-shadow: 0 0 0 0 rgba(226, 86, 104, 0.55);
  animation: live-pulse 1.6s infinite;
}

@keyframes live-pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(226, 86, 104, 0.55);
  }
  70% {
    box-shadow: 0 0 0 10px rgba(226, 86, 104, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(226, 86, 104, 0);
  }
}

.lead-inline {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}

.lead-name {
  font-weight: 700;
}

.status-pressure {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ---------- meters ---------- */

.bar {
  height: 6px;
  border-radius: 999px;
  background: rgba(127, 127, 127, 0.18);
  overflow: hidden;
  position: relative;
}

.bar > span {
  display: block;
  height: 100%;
  background: currentColor;
  opacity: 0.85;
  transition: width 280ms ease;
}

.bar.is-pressure > span {
  background: var(--d-accent-strong);
  opacity: 1;
}

.bar.is-pressure.is-critical > span {
  background: var(--d-danger);
}

.status-shield {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
}

.bar--shield > span {
  background: linear-gradient(90deg, #5a7aa6, #8eb4e8);
  opacity: 0.92;
}

.chair-bite-row {
  margin-top: 12px;
}

.chair-bite-btn {
  width: 100%;
  justify-content: center;
}

.cta-banana {
  margin: 0 0 8px;
  font-size: 13px;
  line-height: 1.4;
}

.cta-banana strong {
  font-weight: 700;
  color: var(--d-accent);
}

/* ---------- unlock pool preview (no menu rows) ---------- */

.uc-demo {
  padding: 14px 12px;
  border-radius: 12px;
  border: 1px solid rgba(127, 127, 127, 0.22);
  background: rgba(127, 127, 127, 0.06);
}

.uc-demo-row {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px 12px;
  margin-bottom: 10px;
}

.uc-demo-label {
  font-size: 13px;
  font-weight: 700;
}

.uc-demo-tk {
  font-size: 15px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--d-accent);
}

.uc-demo-bar {
  height: 8px;
  border-radius: 999px;
  background: rgba(127, 127, 127, 0.2);
  overflow: hidden;
}

.uc-demo-bar > span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--d-accent-strong), var(--d-accent));
  transition: width 280ms ease;
}

.uc-demo-chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}

.uc-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 64px;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(127, 127, 127, 0.12);
}

.uc-chip-n {
  font-size: 10px;
  font-weight: 700;
  opacity: 0.75;
  max-width: 88px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.uc-chip-a {
  font-size: 12px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--d-accent);
}

.uc-demo-presets {
  margin-top: 10px;
  text-align: center;
  font-size: 12px;
}

.stage-idle-hint {
  margin: 0;
  padding: 10px 8px;
  text-align: center;
  line-height: 1.45;
}

/* ---------- cta card (guest) ---------- */

.cta-card {
  border: 1px solid rgba(201, 122, 58, 0.4);
  background: rgba(201, 122, 58, 0.08);
  border-radius: 14px;
  padding: 16px;
  align-items: flex-start;
  gap: 8px;
}

.cta-title {
  font-size: 18px;
  font-weight: 700;
}

.cta-text {
  font-size: 14px;
  color: inherit;
  opacity: 0.8;
  line-height: 1.45;
}

.cta-btn {
  margin-top: 6px;
  font-size: 15px;
  height: 44px;
  padding: 0 22px;
}

/* ---------- model card ---------- */

.model-card {
  flex-direction: row;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border: 1px solid rgba(127, 127, 127, 0.25);
  background: rgba(127, 127, 127, 0.06);
  border-radius: 14px;
}

.model-card-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.model-card-title {
  font-size: 15px;
  font-weight: 700;
}

.model-card-sub {
  font-size: 13px;
  color: inherit;
  opacity: 0.65;
}

.danger-btn {
  border: 1px solid var(--d-danger);
  background: transparent;
  color: var(--d-danger);
  border-radius: 20px;
  height: 40px;
  padding: 0 18px;
  font-size: 14px;
  font-weight: 600;
  transition: background-color 120ms ease;
}

.danger-btn:hover:not(:disabled) {
  background: rgba(226, 86, 104, 0.12);
}

html[data-theme='light'] .danger-btn:hover:not(:disabled) {
  background: rgba(177, 48, 73, 0.1);
}

.danger-btn:disabled {
  opacity: 0.5;
}

/* ---------- section title ---------- */

.section-title {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-size: 14px;
  font-weight: 600;
  color: inherit;
}

.section-aside {
  margin-left: auto;
}

/* ---------- goals ---------- */

.goals-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.goal {
  position: relative;
  border: 1px solid rgba(127, 127, 127, 0.25);
  background: rgba(127, 127, 127, 0.05);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 140ms ease, background-color 140ms ease;
}

.goal.is-mine {
  border-color: rgba(201, 122, 58, 0.55);
  background: rgba(201, 122, 58, 0.06);
}

.goal.is-mine::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  bottom: 12px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: var(--d-accent-strong);
}

.goal.is-moving {
  border-color: var(--d-accent-strong);
  background: rgba(201, 122, 58, 0.1);
}

.goal-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}

.goal-head-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.goal-name {
  font-weight: 600;
  font-size: 14px;
}

.goal-price {
  font-size: 13px;
  color: inherit;
  opacity: 0.7;
}

.you-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(201, 122, 58, 0.18);
  color: var(--d-accent);
  border: 1px solid rgba(201, 122, 58, 0.4);
  white-space: nowrap;
}

.goal-meta {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: inherit;
  opacity: 0.7;
}

.goal-progress {
  position: relative;
  height: 5px;
  border-radius: 999px;
  background: rgba(127, 127, 127, 0.18);
  overflow: hidden;
}

.goal-progress > span {
  position: absolute;
  left: 0;
  top: 0;
  display: block;
  height: 100%;
  transition: width 240ms ease;
}

.goal-progress > span.all {
  background: currentColor;
  opacity: 0.55;
}

.goal-progress > span.mine {
  background: var(--d-accent-strong);
  opacity: 1;
}

/* ---------- inline tip controls ---------- */

.goal-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tip-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.preset-btn {
  border-radius: 999px;
  border: 1px solid rgba(127, 127, 127, 0.4);
  background: transparent;
  color: inherit;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  transition: background-color 120ms ease, border-color 120ms ease;
}

.preset-btn:hover:not(:disabled) {
  background: rgba(127, 127, 127, 0.12);
  border-color: rgba(127, 127, 127, 0.6);
}

.preset-btn:disabled {
  opacity: 0.45;
}

.custom-tip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}

.amount-input {
  width: 100%;
  height: 40px;
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid rgba(127, 127, 127, 0.4);
  background: rgba(127, 127, 127, 0.12);
  color: inherit;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: border-color 140ms ease, background-color 140ms ease;
}

.amount-input::-webkit-outer-spin-button,
.amount-input::-webkit-inner-spin-button {
  margin: 0;
  appearance: none;
}

.amount-input:focus {
  border-color: rgba(127, 127, 127, 0.7);
  background: rgba(127, 127, 127, 0.2);
}

.amount-input.compact {
  width: 84px;
  height: 32px;
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 13px;
  text-align: center;
}

.primary-btn {
  border: 1px solid transparent;
  border-radius: 20px;
  padding: 0 18px;
  height: 40px;
  font-size: 14px;
  font-weight: 600;
  background: var(--d-accent-strong);
  color: #fff;
  transition: background-color 120ms ease, opacity 120ms ease;
}

.primary-btn:hover:not(:disabled) {
  background: var(--d-accent-darker);
}

.primary-btn:disabled {
  opacity: 0.45;
}

.primary-btn.small {
  height: 32px;
  padding: 0 14px;
  font-size: 13px;
  border-radius: 16px;
}

/* ---------- guest lock ---------- */

.goal-locked {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px dashed rgba(127, 127, 127, 0.5);
  background: transparent;
  color: inherit;
  opacity: 0.85;
  font-size: 13px;
  font-weight: 600;
}

.goal-locked .lock {
  font-size: 14px;
}

.goal-locked:hover {
  background: rgba(127, 127, 127, 0.08);
}

/* ---------- move controls ---------- */

.move-toggle {
  align-self: flex-start;
  background: transparent;
  border: 1px dashed rgba(127, 127, 127, 0.5);
  color: inherit;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0.8;
  transition: background-color 120ms ease, border-color 120ms ease, opacity 120ms ease;
}

.move-toggle:hover {
  opacity: 1;
  background: rgba(127, 127, 127, 0.08);
}

.move-toggle.is-on {
  border-color: var(--d-accent-strong);
  color: var(--d-accent);
  opacity: 1;
}

.move-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px;
  border-radius: 10px;
  background: rgba(201, 122, 58, 0.08);
  border: 1px solid rgba(201, 122, 58, 0.3);
}

.select {
  height: 40px;
  padding: 0 14px;
  border-radius: 20px;
  border: 1px solid rgba(127, 127, 127, 0.4);
  background: rgba(127, 127, 127, 0.12);
  color: inherit;
  font-size: 13px;
}

.select.compact {
  height: 32px;
  padding: 0 12px;
  border-radius: 16px;
  font-size: 13px;
  flex: 1;
  min-width: 120px;
}

/* ---------- self summary ---------- */

.self-summary {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 600;
  color: var(--d-accent);
}

/* ---------- stage feed ---------- */

.stage-feed {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stage-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid rgba(127, 127, 127, 0.2);
  background: rgba(127, 127, 127, 0.05);
  font-size: 13px;
  color: inherit;
}

.stage-item .emoji {
  font-size: 16px;
  line-height: 1;
}

.stage-item .text {
  flex: 1;
  min-width: 0;
}

.stage-item .countdown {
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--d-accent);
}

.stage-item.kind-now {
  border-color: rgba(201, 122, 58, 0.55);
  background: rgba(201, 122, 58, 0.12);
  font-weight: 600;
}

.stage-item.kind-queued {
  opacity: 0.85;
}

.stage-item.tone-spotlight:not(.kind-now) {
  color: var(--d-accent);
}

.stage-item.tone-warn {
  border-color: rgba(214, 53, 76, 0.4);
  color: var(--d-danger);
}

/* ---------- toasts ---------- */

.toast-stack {
  position: sticky;
  bottom: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.toast {
  pointer-events: auto;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid rgba(127, 127, 127, 0.35);
  background: var(--d-toast-bg);
  color: var(--d-toast-fg);
}

.toast.success {
  border-color: rgba(127, 127, 127, 0.45);
}

.toast.warn {
  border-color: rgba(214, 53, 76, 0.5);
  color: var(--d-danger);
}

/* ---------- misc ---------- */

.empty {
  font-size: 13px;
  color: inherit;
  opacity: 0.55;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.brand-title {
  font-size: 16px;
  font-weight: 700;
}

.brand-subtitle {
  font-size: 13px;
  color: inherit;
  opacity: 0.65;
}

.muted {
  color: inherit;
  opacity: 0.7;
}

.dim {
  color: inherit;
  opacity: 0.5;
}

.small {
  font-size: 13px;
  line-height: 18px;
}


/* ----- next sheet ----- */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body,
#app {
  min-height: 100%;
  height: 100%;
}

html {
  background: transparent;
  color: #f4f1ea;
  font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas,
    monospace;
  font-size: 12px;
  line-height: 16px;
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
}

/* ---------- shell: anchor remote vertically centered, right edge ---------- */

.overlay-shell {
  height: 100%;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 12px;
  pointer-events: none;
}

/* ---------- the remote ---------- */

.remote {
  pointer-events: auto;
  width: 100%;
  max-width: 260px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px 12px 14px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(34, 32, 28, 0.78) 0%, rgba(20, 19, 17, 0.78) 100%);
  border: 1px solid rgba(255, 255, 255, 0.07);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.07) inset,
    0 -1px 0 rgba(0, 0, 0, 0.5) inset,
    0 12px 32px rgba(0, 0, 0, 0.55);
  color: #f4f1ea;
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
}

.remote.is-locked {
  /* slightly more transparent so it visually recedes */
  background:
    linear-gradient(180deg, rgba(34, 32, 28, 0.62) 0%, rgba(20, 19, 17, 0.62) 100%);
}

.remote.is-activity-flash {
  animation: remote-activity-flash 0.62s ease-out;
}

@keyframes remote-activity-flash {
  0% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.07) inset,
      0 -1px 0 rgba(0, 0, 0, 0.5) inset,
      0 12px 32px rgba(0, 0, 0, 0.55);
  }
  35% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.12) inset,
      0 -1px 0 rgba(0, 0, 0, 0.45) inset,
      0 0 0 2px rgba(255, 184, 107, 0.55),
      0 14px 40px rgba(0, 0, 0, 0.5);
  }
  100% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.07) inset,
      0 -1px 0 rgba(0, 0, 0, 0.5) inset,
      0 12px 32px rgba(0, 0, 0, 0.55);
  }
}

@media (prefers-reduced-motion: reduce) {
  .remote.is-activity-flash {
    animation: none;
  }
}

/* ---------- top bar ---------- */

.remote-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.remote-brand {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.55);
}

.remote-brand::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background: linear-gradient(180deg, #3a3835, #1f1d1a);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.remote-rec {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.4);
}

.remote-rec .led {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(120, 120, 120, 0.35);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5) inset;
}

.remote-rec.is-on {
  color: #ff5b48;
}

.remote-rec.is-on .led {
  background: #ff3b25;
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.5) inset,
    0 0 8px rgba(255, 59, 37, 0.7);
  animation: rec-pulse 1.6s ease-in-out infinite;
}

@keyframes rec-pulse {
  0%,
  100% {
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.5) inset,
      0 0 6px rgba(255, 59, 37, 0.6);
  }
  50% {
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.5) inset,
      0 0 12px rgba(255, 59, 37, 0.95);
  }
}

/* ---------- screen ---------- */

.remote-screen {
  border-radius: 8px;
  padding: 10px 12px;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(255, 196, 80, 0.05) 0px,
      rgba(255, 196, 80, 0.05) 1px,
      transparent 1px,
      transparent 3px
    ),
    linear-gradient(180deg, rgba(42, 31, 16, 0.85) 0%, rgba(26, 19, 8, 0.85) 100%);
  border: 1px solid rgba(255, 170, 60, 0.18);
  box-shadow:
    inset 0 0 12px rgba(0, 0, 0, 0.6),
    inset 0 0 1px rgba(255, 200, 100, 0.15);
  color: #ffb86b;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  text-shadow: 0 0 6px rgba(255, 184, 107, 0.35);
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 56px;
}

.screen-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255, 184, 107, 0.6);
  text-shadow: none;
}

.screen-line {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.screen-line .emoji {
  font-size: 14px;
}

.screen-sub {
  font-size: 10px;
  letter-spacing: 0.04em;
  color: rgba(255, 184, 107, 0.55);
  text-shadow: none;
}

.screen-countdown {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

.screen-empty {
  font-size: 10px;
  color: rgba(255, 184, 107, 0.5);
  letter-spacing: 0.06em;
}

/* ---------- meter ---------- */

.remote-meter {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.meter-label {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.5);
}

.meter-bar {
  height: 4px;
  border-radius: 2px;
  background: rgba(0, 0, 0, 0.5);
  box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.4);
  overflow: hidden;
}

.meter-bar > span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #6b5a3a, #d39a4f, #ffb86b);
  transition: width 280ms ease;
}

.meter-bar.is-pressure > span {
  background: linear-gradient(90deg, #c97a3a, #e8602f);
}

.meter-bar.is-critical > span {
  background: linear-gradient(90deg, #e8602f, #ff3b25);
  animation: bar-flicker 1.2s ease-in-out infinite;
}

.meter-bar--shield > span {
  background: linear-gradient(90deg, #4a6b8c, #6a9bd8, #9ec5ff);
  opacity: 0.95;
}

.remote-meter--shield .meter-label {
  color: rgba(200, 220, 255, 0.65);
}

.remote-open-seat {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 10px 12px;
  margin-top: 2px;
  border-radius: 10px;
  background: rgba(255, 184, 107, 0.08);
  border: 1px solid rgba(255, 184, 107, 0.2);
}

.open-seat-title {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255, 214, 170, 0.85);
}

.open-seat-copy,
.open-seat-you,
.guest-banana {
  font-family: Inter, system-ui, sans-serif;
  font-size: 11px;
  line-height: 1.35;
  color: rgba(244, 241, 234, 0.82);
  margin: 0;
}

.open-seat-copy strong,
.open-seat-you strong,
.guest-banana strong {
  color: #ffd6aa;
}

.open-seat-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.open-seat-foot {
  font-size: 10px;
  line-height: 1.35;
  margin: 0;
  color: rgba(244, 241, 234, 0.55);
}

.bite-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255, 184, 107, 0.45);
  background: linear-gradient(180deg, rgba(255, 184, 107, 0.35), rgba(200, 130, 60, 0.25));
  color: #1a1208;
  font-family: Inter, system-ui, sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
}

.bite-btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.bite-btn:hover:not(:disabled) {
  filter: brightness(1.06);
}

@keyframes bar-flicker {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.75;
  }
}

/* ---------- chair row ---------- */

.remote-chair {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.chair-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.5);
}

.chair-name {
  font-family: Inter, system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #f4f1ea;
  margin-left: auto;
  text-align: right;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chair-power {
  font-size: 10px;
  color: rgba(244, 241, 234, 0.55);
  font-variant-numeric: tabular-nums;
}

/* ---------- control pad ---------- */

.remote-pad {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 10px 12px;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.15));
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    inset 0 -1px 0 rgba(0, 0, 0, 0.4);
}

.pad-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.pad-title {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: Inter, system-ui, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.7);
}

.pad-title .lock {
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0;
}

.pad-cost {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: rgba(244, 241, 234, 0.45);
  font-family: Inter, system-ui, sans-serif;
}

.pad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.pad-grid.is-disabled {
  opacity: 0.55;
  filter: saturate(0.4);
}

.pad-key {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 56px;
  padding: 6px 4px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  background:
    linear-gradient(180deg, rgba(70, 64, 56, 0.85) 0%, rgba(34, 30, 26, 0.85) 100%);
  color: #f4f1ea;
  font-family: Inter, system-ui, sans-serif;
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -2px 0 rgba(0, 0, 0, 0.35),
    0 1px 2px rgba(0, 0, 0, 0.4);
  transition: transform 80ms ease, box-shadow 80ms ease, background-color 120ms ease;
}

.pad-key:hover:not(:disabled) {
  background:
    linear-gradient(180deg, rgba(86, 78, 68, 0.92) 0%, rgba(40, 36, 32, 0.92) 100%);
}

.pad-key:active:not(:disabled) {
  transform: translateY(1px);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    inset 0 -1px 0 rgba(0, 0, 0, 0.4),
    0 0 0 rgba(0, 0, 0, 0);
  background:
    linear-gradient(180deg, rgba(60, 54, 48, 0.95) 0%, rgba(30, 26, 22, 0.95) 100%);
}

.pad-key:disabled {
  opacity: 0.5;
}

.pad-key-emoji {
  font-size: 18px;
  line-height: 1;
  filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.45));
}

.pad-key-label {
  font-size: 9px;
  letter-spacing: 0.04em;
  color: rgba(244, 241, 234, 0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.pad-key-cd {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  font-weight: 700;
  color: #ffb86b;
  font-variant-numeric: tabular-nums;
}

.remote-meter--bottom {
  margin-top: 2px;
}


/* ----- next sheet ----- */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body,
#app {
  min-height: 100%;
  /* Same canvas in light and dark — host panel no longer shows through. */
  background: #303133 !important;
  background-color: #303133 !important;
}

html,
body,
input {
  color: #f8f8f8;
}

html[data-theme='light'] {
  color-scheme: light;
  --d-accent: #8c4a17;
  --d-accent-strong: #8c4a17;
  --d-danger: #c0354b;
}

html[data-theme='light'],
html[data-theme='light'] body,
html[data-theme='light'] input {
  color: #1a1a1a;
}

:root {
  --d-accent: #e6a04a;
  --d-accent-strong: #c97a3a;
  --d-danger: #ff7a8c;
}

html {
  /* `dark light` lets the UA pick a dark canvas in iframes — avoid unless theme is known. */
  color-scheme: normal;
  font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica,
    Arial, sans-serif;
  font-size: 14px;
  line-height: 20px;
  -webkit-font-smoothing: antialiased;
}

html[data-theme='dark'] {
  color-scheme: dark;
}

input {
  font-family: inherit;
}

.settings-shell {
  container-type: inline-size;
  container-name: settings;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  max-width: 640px;
  margin: 0 auto;
  background: #303133;
}

.settings-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(127, 127, 127, 0.18);
}

.settings-section:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.settings-section-head h2 {
  font-size: 16px;
  line-height: 22px;
  font-weight: 700;
  margin: 0 0 4px;
  color: inherit;
}

.settings-section-head p {
  font-size: 13px;
  line-height: 18px;
  color: inherit;
  opacity: 0.7;
  margin: 0;
}

.howit-intro {
  font-size: 13px;
  line-height: 1.45;
  color: inherit;
  opacity: 0.85;
  margin: 0 0 14px;
}

.howit-intro strong {
  font-weight: 700;
}

.settings-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* Slot-width aware (not browser viewport) — see AGENTS.md layout rules */
@container settings (max-width: 540px) {
  .settings-fields {
    grid-template-columns: 1fr;
  }
}

/* Make a single-field section span full width nicely */
.settings-fields > .field:only-child {
  grid-column: 1 / -1;
  max-width: 320px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 14px;
  line-height: 20px;
  font-weight: 600;
  color: inherit;
  margin-left: 3px;
}

.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrap input {
  width: 100%;
  height: 40px;
  padding: 10px 44px 10px 16px;
  border: 1px solid currentColor;
  border-color: rgba(127, 127, 127, 0.4);
  border-radius: 20px;
  background-color: rgba(127, 127, 127, 0.12);
  font-size: 14px;
  line-height: 20px;
  outline: none;
  transition: border-color 120ms ease, background-color 120ms ease;
}

.input-wrap input::-webkit-outer-spin-button,
.input-wrap input::-webkit-inner-spin-button {
  margin: 0;
  appearance: none;
}

.input-wrap input:focus {
  border-color: rgba(127, 127, 127, 0.7);
  background-color: rgba(127, 127, 127, 0.2);
}

.input-wrap input:disabled {
  cursor: default;
  opacity: 0.33;
}

.input-wrap .unit {
  position: absolute;
  right: 16px;
  font-size: 13px;
  line-height: 18px;
  color: inherit;
  opacity: 0.55;
  pointer-events: none;
}

.field .hint {
  font-size: 13px;
  line-height: 18px;
  color: inherit;
  opacity: 0.65;
  margin-left: 3px;
}

.field.is-invalid .input-wrap input {
  border-color: var(--d-danger);
}

.field .err {
  font-size: 13px;
  line-height: 18px;
  color: var(--d-danger);
  margin-left: 3px;
}

.banner {
  font-size: 13px;
  line-height: 18px;
  color: inherit;
  opacity: 0.65;
}

.deck-pad-title {

.deck-pad-cost {
