<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Director · rightOverlay (standalone)</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body,
#app {
  min-height: 100%;
  height: 100%;
}

html {
  background: transparent;
  color: #f4f1ea;
  font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas,
    monospace;
  font-size: 12px;
  line-height: 16px;
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
}

/* ---------- shell: anchor remote vertically centered, right edge ---------- */

.overlay-shell {
  height: 100%;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 12px;
  pointer-events: none;
}

/* ---------- the remote ---------- */

.remote {
  pointer-events: auto;
  width: 100%;
  max-width: 260px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px 12px 14px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(34, 32, 28, 0.78) 0%, rgba(20, 19, 17, 0.78) 100%);
  border: 1px solid rgba(255, 255, 255, 0.07);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.07) inset,
    0 -1px 0 rgba(0, 0, 0, 0.5) inset,
    0 12px 32px rgba(0, 0, 0, 0.55);
  color: #f4f1ea;
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
}

.remote.is-locked {
  /* slightly more transparent so it visually recedes */
  background:
    linear-gradient(180deg, rgba(34, 32, 28, 0.62) 0%, rgba(20, 19, 17, 0.62) 100%);
}

.remote.is-activity-flash {
  animation: remote-activity-flash 0.62s ease-out;
}

@keyframes remote-activity-flash {
  0% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.07) inset,
      0 -1px 0 rgba(0, 0, 0, 0.5) inset,
      0 12px 32px rgba(0, 0, 0, 0.55);
  }
  35% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.12) inset,
      0 -1px 0 rgba(0, 0, 0, 0.45) inset,
      0 0 0 2px rgba(255, 184, 107, 0.55),
      0 14px 40px rgba(0, 0, 0, 0.5);
  }
  100% {
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.07) inset,
      0 -1px 0 rgba(0, 0, 0, 0.5) inset,
      0 12px 32px rgba(0, 0, 0, 0.55);
  }
}

@media (prefers-reduced-motion: reduce) {
  .remote.is-activity-flash {
    animation: none;
  }
}

/* ---------- top bar ---------- */

.remote-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.remote-brand {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.55);
}

.remote-brand::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background: linear-gradient(180deg, #3a3835, #1f1d1a);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.remote-rec {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.4);
}

.remote-rec .led {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(120, 120, 120, 0.35);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5) inset;
}

.remote-rec.is-on {
  color: #ff5b48;
}

.remote-rec.is-on .led {
  background: #ff3b25;
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.5) inset,
    0 0 8px rgba(255, 59, 37, 0.7);
  animation: rec-pulse 1.6s ease-in-out infinite;
}

@keyframes rec-pulse {
  0%,
  100% {
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.5) inset,
      0 0 6px rgba(255, 59, 37, 0.6);
  }
  50% {
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.5) inset,
      0 0 12px rgba(255, 59, 37, 0.95);
  }
}

/* ---------- screen ---------- */

.remote-screen {
  border-radius: 8px;
  padding: 10px 12px;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(255, 196, 80, 0.05) 0px,
      rgba(255, 196, 80, 0.05) 1px,
      transparent 1px,
      transparent 3px
    ),
    linear-gradient(180deg, rgba(42, 31, 16, 0.85) 0%, rgba(26, 19, 8, 0.85) 100%);
  border: 1px solid rgba(255, 170, 60, 0.18);
  box-shadow:
    inset 0 0 12px rgba(0, 0, 0, 0.6),
    inset 0 0 1px rgba(255, 200, 100, 0.15);
  color: #ffb86b;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  text-shadow: 0 0 6px rgba(255, 184, 107, 0.35);
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 56px;
}

.screen-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255, 184, 107, 0.6);
  text-shadow: none;
}

.screen-line {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.screen-line .emoji {
  font-size: 14px;
}

.screen-sub {
  font-size: 10px;
  letter-spacing: 0.04em;
  color: rgba(255, 184, 107, 0.55);
  text-shadow: none;
}

.screen-countdown {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

.screen-empty {
  font-size: 10px;
  color: rgba(255, 184, 107, 0.5);
  letter-spacing: 0.06em;
}

/* ---------- meter ---------- */

.remote-meter {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.meter-label {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.5);
}

.meter-bar {
  height: 4px;
  border-radius: 2px;
  background: rgba(0, 0, 0, 0.5);
  box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.4);
  overflow: hidden;
}

.meter-bar > span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #6b5a3a, #d39a4f, #ffb86b);
  transition: width 280ms ease;
}

.meter-bar.is-pressure > span {
  background: linear-gradient(90deg, #c97a3a, #e8602f);
}

.meter-bar.is-critical > span {
  background: linear-gradient(90deg, #e8602f, #ff3b25);
  animation: bar-flicker 1.2s ease-in-out infinite;
}

.meter-bar--shield > span {
  background: linear-gradient(90deg, #4a6b8c, #6a9bd8, #9ec5ff);
  opacity: 0.95;
}

.remote-meter--shield .meter-label {
  color: rgba(200, 220, 255, 0.65);
}

.remote-open-seat {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 10px 12px;
  margin-top: 2px;
  border-radius: 10px;
  background: rgba(255, 184, 107, 0.08);
  border: 1px solid rgba(255, 184, 107, 0.2);
}

.open-seat-title {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255, 214, 170, 0.85);
}

.open-seat-copy,
.open-seat-you,
.guest-banana {
  font-family: Inter, system-ui, sans-serif;
  font-size: 11px;
  line-height: 1.35;
  color: rgba(244, 241, 234, 0.82);
  margin: 0;
}

.open-seat-copy strong,
.open-seat-you strong,
.guest-banana strong {
  color: #ffd6aa;
}

.open-seat-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.open-seat-foot {
  font-size: 10px;
  line-height: 1.35;
  margin: 0;
  color: rgba(244, 241, 234, 0.55);
}

.bite-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255, 184, 107, 0.45);
  background: linear-gradient(180deg, rgba(255, 184, 107, 0.35), rgba(200, 130, 60, 0.25));
  color: #1a1208;
  font-family: Inter, system-ui, sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
}

.bite-btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.bite-btn:hover:not(:disabled) {
  filter: brightness(1.06);
}

@keyframes bar-flicker {
  0%,
  100% {
    opacity: 1;
  }
  50% {
    opacity: 0.75;
  }
}

/* ---------- chair row ---------- */

.remote-chair {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.chair-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.5);
}

.chair-name {
  font-family: Inter, system-ui, sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #f4f1ea;
  margin-left: auto;
  text-align: right;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chair-power {
  font-size: 10px;
  color: rgba(244, 241, 234, 0.55);
  font-variant-numeric: tabular-nums;
}

/* ---------- control pad ---------- */

.remote-pad {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 10px 12px;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.15));
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    inset 0 -1px 0 rgba(0, 0, 0, 0.4);
}

.pad-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.pad-title {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: Inter, system-ui, sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(244, 241, 234, 0.7);
}

.pad-title .lock {
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0;
}

.pad-cost {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: rgba(244, 241, 234, 0.45);
  font-family: Inter, system-ui, sans-serif;
}

.pad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.pad-grid.is-disabled {
  opacity: 0.55;
  filter: saturate(0.4);
}

.pad-key {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 56px;
  padding: 6px 4px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  background:
    linear-gradient(180deg, rgba(70, 64, 56, 0.85) 0%, rgba(34, 30, 26, 0.85) 100%);
  color: #f4f1ea;
  font-family: Inter, system-ui, sans-serif;
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -2px 0 rgba(0, 0, 0, 0.35),
    0 1px 2px rgba(0, 0, 0, 0.4);
  transition: transform 80ms ease, box-shadow 80ms ease, background-color 120ms ease;
}

.pad-key:hover:not(:disabled) {
  background:
    linear-gradient(180deg, rgba(86, 78, 68, 0.92) 0%, rgba(40, 36, 32, 0.92) 100%);
}

.pad-key:active:not(:disabled) {
  transform: translateY(1px);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.04),
    inset 0 -1px 0 rgba(0, 0, 0, 0.4),
    0 0 0 rgba(0, 0, 0, 0);
  background:
    linear-gradient(180deg, rgba(60, 54, 48, 0.95) 0%, rgba(30, 26, 22, 0.95) 100%);
}

.pad-key:disabled {
  opacity: 0.5;
}

.pad-key-emoji {
  font-size: 18px;
  line-height: 1;
  filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.45));
}

.pad-key-label {
  font-size: 9px;
  letter-spacing: 0.04em;
  color: rgba(244, 241, 234, 0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.pad-key-cd {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  font-weight: 700;
  color: #ffb86b;
  font-variant-numeric: tabular-nums;
}

.remote-meter--bottom {
  margin-top: 2px;
}

  </style>
</head>
<body>
  <div id="app"></div>
  <!-- No script: portable HTML/CSS only. Real slot loads via Vite + Preact. -->
</body>
</html>
